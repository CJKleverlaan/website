
<!DOCTYPE html>
<html lang='nl'>
<head>
<meta charset='UTF-8' />
<meta name='viewport' content='width=device-width, initial-scale=1.0'/>
<title>ACTA Dental Quick Screening </title>
<style>
  :root{
    --c-natural:#c8e6c9;
    --c-direct:#bbdefb;
    --c-indirect:#ffe082;
    --c-missing:#ffccbc;
    --c-border:#666;
    --gap:8px;
    --tile:46px;
  }
  body{ font-family: Arial, sans-serif; margin:28px; }
  h1{ margin:0 0 8px; }
  .subtle{ color:#444; margin-bottom:10px; }

  /* Legend */
  .legend{ display:flex; gap:18px; flex-wrap:wrap; align-items:center; margin:10px 0 14px; }
  .legend-item{ display:inline-flex; align-items:center; gap:8px; }
  .swatch{ width:18px; height:18px; border-radius:3px; border:1px solid #333; display:inline-block; }
  .swatch.natural{ background:var(--c-natural); }
  .swatch.direct{ background:var(--c-direct); }
  .swatch.indirect{ background:var(--c-indirect); }
  .swatch.missing{ background:var(--c-missing); }

  .toolbar{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .toolbar button{ padding:6px 10px; border:1px solid #333; border-radius:6px; cursor:pointer; background:#fff; }
  .toolbar button:hover{ background:#f2f2f2; }

  .odontogram{
    display:grid; grid-template-columns: repeat(16, var(--tile)); gap:var(--gap);
  }
  .tooth{ width:var(--tile); display:flex; flex-direction:column; align-items:center; }
  .tooth-box{
    width:var(--tile); height:var(--tile); border:1px solid var(--c-border);
    border-radius:6px; display:flex; justify-content:center; align-items:center; cursor:pointer;
    background:#fff; /* base so we always see a color change when class applied */
  }
  /* Statuskleuren voor tanden */
  .t-type-1{ background:var(--c-natural) !important; }
  .t-type-2{ background:var(--c-direct) !important; }
  .t-type-3{ background:var(--c-indirect) !important; }
  .t-type-4{ background:var(--c-missing) !important; }

  .score-label{ font-size:16px; font-weight:bold; color:#111; }
  .tooth-num{ font-size:11px; margin-top:4px; }

  .pairs-wrap{ margin-top:20px; }
  .pairs-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; }
  .pair-card{ border:1px solid var(--c-border); border-radius:8px; padding:10px; background:#fafafa; }
  .pair-title{ font-weight:700; margin-bottom:4px; }
  .pair-line{ font-family:monospace; font-size:14px; }

  #totalScore{ margin-bottom:10px; font-size:16px; font-weight:bold; }
  #totalLetters{ margin-top:14px; font-size:18px; font-weight:bold; color:#222; }
</style>
</head>
<body>
<h1>ACTA Dental Quick Screening </h1>
<p class='subtle'>Klik op tanden om de status te doorlopen (Natural → Direct → Indirect → Missing).</p>

<div class='legend'>
  <div class='legend-item'><span class='swatch natural'></span> Natural</div>
  <div class='legend-item'><span class='swatch direct'></span> Direct</div>
  <div class='legend-item'><span class='swatch indirect'></span> Indirect</div>
  <div class='legend-item'><span class='swatch missing'></span> Missing</div>
</div>

<div class='toolbar'>
  <button id='resetAll'>Reset alles</button>
  <button id='exportJson'>Export JSON</button>
  <input id='importInput' type='file' accept='application/json' style='display:none'/>
  <button id='importBtn'>Import JSON</button>
</div>

<div id='totalScore'>Totale score: 0</div>

<h2>Koppelscores</h2>
<div class='pairs-wrap'> <div id='pairScores' class='pairs-grid'></div> </div>

<div id='totalLetters'>Totale lettercode: …</div>

<h2>Odontogram</h2>
<div id='odontogram' class='odontogram'></div>

<script>
const adultTeeth=[18,17,16,15,14,13,12,11,21,22,23,24,25,26,27,28,48,47,46,45,44,43,42,41,31,32,33,34,35,36,37,38];
const STORAGE_KEY="odontogram_layout_total_letters_v2"; // new key so styles don't conflict with previous cache
const SCORE_MAP={1:0,2:1,3:2,4:3};
const BINARY_MAP={1:"00",2:"01",3:"10",4:"11"};
const MIRROR=[[18,48],[17,47],[16,46],[15,45],[14,44],[13,43],[12,42],[11,41],[21,31],[22,32],[23,33],[24,34],[25,35],[26,36],[27,37],[28,38]];

function loadData(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch{return{}} }
function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
let data=loadData();
if(Object.keys(data).length===0){ adultTeeth.forEach(t=>data[t]=1); saveData(); }

const grid=document.getElementById('odontogram');
render();

function render(){
  grid.innerHTML="";
  let totalScore=0;

  adultTeeth.forEach(num=>{
    const wrap=document.createElement('div'); wrap.className='tooth';
    const status=data[num]; const score=SCORE_MAP[status]; totalScore+=score;
    const box=document.createElement('div'); box.className=`tooth-box t-type-${status}`;
    box.onclick=()=>{ data[num]=data[num]%4+1; saveData(); render(); };
    const lab=document.createElement('div'); lab.className='score-label'; lab.textContent=score; box.appendChild(lab);
    const nr=document.createElement('div'); nr.className='tooth-num'; nr.textContent=num;
    wrap.appendChild(box); wrap.appendChild(nr); grid.appendChild(wrap);
  });

  document.getElementById('totalScore').textContent="Totale score: "+totalScore;

  const cards=MIRROR.map(([a,b])=>{
    const bits=BINARY_MAP[data[a]]+BINARY_MAP[data[b]];
    const dec=parseInt(bits,2);
    const letter=String.fromCharCode(65+dec);
    return `<div class='pair-card'>
      <div class='pair-title'>${a} – ${b}</div>
      <div class='pair-line'>Bits: ${bits}</div>
      <div class='pair-line'>Decimaal: ${dec}</div>
      <div class='pair-line'><strong>Letter: ${letter}</strong></div>
    </div>`;}).join('');
  document.getElementById('pairScores').innerHTML=cards;

  let totalLetters="";
  MIRROR.forEach(([a,b])=>{
    const bits=BINARY_MAP[data[a]]+BINARY_MAP[data[b]];
    const dec=parseInt(bits,2);
    totalLetters+=String.fromCharCode(65+dec);
  });
  document.getElementById('totalLetters').textContent="Totale lettercode: "+totalLetters;
}

// reset/export/import

document.getElementById('resetAll').onclick=()=>{ if(confirm('Reset?')){ adultTeeth.forEach(t=>data[t]=1); saveData(); render(); } };

document.getElementById('exportJson').onclick=()=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='odontogram.json'; a.click(); URL.revokeObjectURL(url);
};

document.getElementById('importBtn').onclick=()=>document.getElementById('importInput').click();
document.getElementById('importInput').onchange=async(e)=>{
  const f=e.target.files[0]; if(!f)return;
  try{
    const obj=JSON.parse(await f.text());
    Object.keys(obj).forEach(k=>{ if(!adultTeeth.includes(parseInt(k))||![1,2,3,4].includes(obj[k])) delete obj[k]; });
    data=obj; saveData(); render();
  }catch(err){ alert('Import mislukt'); }
  e.target.value="";
};
</script>
</body>
</html>
